server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── JS/CSS cache bust (exclude proxied paths) ──
    location ~* ^/(?!grafana/|pgweb/|redis/|elasticvue/|es-proxy/|strapi/|admin/).*\.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── API proxy → polyon-core ──
    location /api/ {
        set $upstream_api http://polyon-core:8000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /health {
        set $upstream_api http://polyon-core:8000;
        proxy_pass $upstream_api;
    }

    # ── Operator API proxy (sentinel, setup, reset) ──
    location /api/sentinel/ {
        set $operator http://polyon-operator:1110;
        proxy_pass $operator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/setup/ {
        set $operator http://polyon-operator:1110;
        proxy_pass $operator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/reset/ {
        set $operator http://polyon-operator:1110;
        proxy_pass $operator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Keycloak Auth proxy ──
    location /auth/ {
        set $upstream_kc http://polyon-auth:8080;
        proxy_pass $upstream_kc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 1111;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Grafana proxy ──
    location /grafana/ {
        set $upstream_grafana http://polyon-grafana:3000;
        proxy_pass $upstream_grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }

    # ── Stalwart Mail API proxy ──
    location /mail-proxy/ {
        set $upstream_api http://polyon-core:8000;
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ── DB 관리 도구 프록시 ──
    location /pgweb/ {
        set $pgweb http://polyon-pgweb:8081;
        proxy_pass $pgweb;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }

    location /redis/ {
        set $redis_cmd http://polyon-redis-commander:8081;
        proxy_pass $redis_cmd;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }

    location /elasticvue/ {
        set $elasticvue http://polyon-elasticvue:8080;
        proxy_pass $elasticvue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }

    # ── ES proxy (Elasticvue iframe → ES API) ──
    location /es-proxy/ {
        set $es http://polyon-search:9200;
        proxy_pass $es;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}
